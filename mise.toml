[tools]
actionlint = "latest"
flux2 = "latest"
gh = "latest"
k3d = "latest"
k9s = "latest"
kubectl = "latest"
kustomize = "latest"
pre-commit = "latest"
python = "3.14"
ruff = "latest"
trivy = "latest"
uv = "latest"

[settings]
python.uv_venv_auto = true
idiomatic_version_file_enable_tools = ["python"]
experimental = true

[env]
APP_REPO = 'cicd-workflow'
GITOPS_REPO = 'cicd-workflow-gitops'

[hooks]
enter = "bash ./scripts/setup_project"

[tasks.k8s-setup-local]
description = "Set up a basic Kubernetes cluster for development that builds the local images and applies them"
run = "bash ./kubernetes/setup_cluster_local"

[tasks.k8s-setup-minimal]
description = "Set up a minimal Kubernetes cluster for development"
run = "bash ./kubernetes/setup_cluster_minimal"

[tasks.e2e-tests]
description = "Run end-to-end tests on the Kubernetes deployment"
run = "cd ./kubernetes/ && uv sync --group dev && uv run pytest"

[tasks.setup-key]
description = "Set up a deploy key for our repo"
run = "bash ./scripts/setup_deploy_key"
