name: Web Tests

# Triggers on every PR (no on-level paths filter) so the required `web-required`
# status check always reports. Path filtering is done INTERNALLY via
# dorny/paths-filter; the heavy test job only runs when the Web app is affected,
# and the gate job passes through cleanly otherwise.

on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      web: ${{ steps.filter.outputs.web }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4.0.1
        id: filter
        with:
          filters: |
            web:
              - 'apps/study-tracker/web/**'
              - '.github/workflows/_python-service-tests.yaml'
              - '.github/workflows/web-tests.yaml'

  test:
    name: Test
    needs: changes
    if: needs.changes.outputs.web == 'true'
    uses: ./.github/workflows/_python-service-tests.yaml
    permissions:
      contents: read
      pull-requests: write
    with:
      service: web
      working-directory: ./apps/study-tracker/web

  web-required:
    name: web-required
    needs: [changes, test]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - name: Aggregate result
        env:
          LABEL: Web
          CHANGED: ${{ needs.changes.outputs.web }}
          RESULT: ${{ needs.test.result }}
        run: bash scripts/ci/required-gate.sh
