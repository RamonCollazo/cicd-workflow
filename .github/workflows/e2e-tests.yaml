name: E2E Tests

# Standalone end-to-end pipeline. E2E exercises the apps running on Kubernetes,
# so it is triggered by API or Web app changes (not by bare kubernetes/**
# edits, which manifests-lint covers). Triggers on every PR so the required
# `e2e-required` check always reports; path filtering is done internally and the
# suite runs at most once per run (no double runs when both services change).

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      apps: ${{ steps.filter.outputs.apps }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4.0.1
        id: filter
        with:
          filters: |
            apps:
              - 'apps/study-tracker/api/**'
              - 'apps/study-tracker/web/**'
              - '.github/workflows/e2e-tests.yaml'

  e2e:
    name: E2E (k3d)
    needs: changes
    if: needs.changes.outputs.apps == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: ./kubernetes
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install pinned tools (k3d, kubectl, uv) via mise
        uses: jdx/mise-action@v2

      - name: Sync e2e dependencies
        run: uv sync --locked --group dev

      - name: Run e2e suite
        timeout-minutes: 15
        run: uv run pytest

      - name: Cluster diagnostics on failure
        if: failure()
        run: bash "$GITHUB_WORKSPACE/scripts/ci/cluster-diagnostics.sh"

  e2e-required:
    name: e2e-required
    needs: [changes, e2e]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - name: Aggregate result
        env:
          LABEL: E2E
          CHANGED: ${{ needs.changes.outputs.apps }}
          RESULT: ${{ needs.e2e.result }}
        run: bash scripts/ci/required-gate.sh
