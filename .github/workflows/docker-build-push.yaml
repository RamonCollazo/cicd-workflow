name: Build and Push Docker Images

on:
  push:
    tags:
      - "study-tracker-api-v*"
      - "study-tracker-web-v*"

permissions:
  contents: read

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push-api:
    name: Build and Push API
    runs-on: ubuntu-latest
    # Only run for api version tags (study-tracker-api-vX.Y.Z)
    if: startsWith(github.ref_name, 'study-tracker-api-v')
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image name and tags
        id: image
        env:
          OWNER: ${{ github.repository_owner }}
          GIT_TAG: ${{ github.ref_name }}
          TAG_PREFIX: study-tracker-api-v
          IMAGE_NAME: study-tracker-api
        run: |
          # Lowercase the owner segment for GHCR
          IMAGE="${REGISTRY}/${OWNER,,}/${IMAGE_NAME}"
          # Strip the full "study-tracker-api-v" prefix to get bare semver, then re-prefix with v.
          # Example: study-tracker-api-v0.3.1 -> 0.3.1 -> v0.3.1
          BARE="${GIT_TAG#${TAG_PREFIX}}"
          VERSION_TAG="v${BARE}"
          {
            echo "name=${IMAGE}"
            echo "version_tag=${VERSION_TAG}"
            echo "latest_tag=latest"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push API Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./apps/study-tracker/api
          push: true
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api
          tags: |
            ${{ steps.image.outputs.name }}:${{ steps.image.outputs.version_tag }}
            ${{ steps.image.outputs.name }}:${{ steps.image.outputs.latest_tag }}
    outputs:
      tag: ${{ steps.image.outputs.version_tag }}
      image: study-tracker-api

  build-and-push-web:
    name: Build and Push Web
    runs-on: ubuntu-latest
    # Only run for web version tags (study-tracker-web-vX.Y.Z)
    if: startsWith(github.ref_name, 'study-tracker-web-v')
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image name and tags
        id: image
        env:
          OWNER: ${{ github.repository_owner }}
          GIT_TAG: ${{ github.ref_name }}
          TAG_PREFIX: study-tracker-web-v
          IMAGE_NAME: study-tracker-web
        run: |
          # Lowercase the owner segment for GHCR
          IMAGE="${REGISTRY}/${OWNER,,}/${IMAGE_NAME}"
          # Strip the full "study-tracker-web-v" prefix to get bare semver, then re-prefix with v.
          # Example: study-tracker-web-v0.1.0 -> 0.1.0 -> v0.1.0
          BARE="${GIT_TAG#${TAG_PREFIX}}"
          VERSION_TAG="v${BARE}"
          {
            echo "name=${IMAGE}"
            echo "version_tag=${VERSION_TAG}"
            echo "latest_tag=latest"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push Web Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./apps/study-tracker/web
          push: true
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web
          tags: |
            ${{ steps.image.outputs.name }}:${{ steps.image.outputs.version_tag }}
            ${{ steps.image.outputs.name }}:${{ steps.image.outputs.latest_tag }}
    outputs:
      tag: ${{ steps.image.outputs.version_tag }}
      image: study-tracker-web

  trigger_gitops_dev:
    name: Update gitops (dev)
    needs: [build-and-push-api, build-and-push-web]
    # always() overrides the default 'skip-when-any-need-is-skipped' behavior
    # of `needs:` — one of the two build jobs is always skipped on a tag push
    # (the prefix selects which). The OR condition then ensures we only run
    # when at least one build succeeded.
    if: |
      always() &&
      (needs.build-and-push-api.result == 'success' ||
       needs.build-and-push-web.result == 'success')
    uses: ./.github/workflows/update-gitops.yaml
    with:
      # Skipped jobs return empty-string outputs; the `||` resolves to
      # whichever job actually ran.
      image: ${{ needs.build-and-push-api.outputs.image || needs.build-and-push-web.outputs.image }}
      tag: ${{ needs.build-and-push-api.outputs.tag || needs.build-and-push-web.outputs.tag }}
      environment: dev
      auto_merge: true
    secrets:
      gitops_app_id: ${{ secrets.GITOPS_APP_ID }}
      gitops_app_key: ${{ secrets.GITOPS_APP_KEY }}
