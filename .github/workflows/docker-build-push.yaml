name: Build and Push Docker Images

on:
  push:
    tags:
      - "study-tracker-api-v*"
      - "study-tracker-web-v*"

permissions:
  contents: read

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push-api:
    name: Build and Push API
    runs-on: ubuntu-latest
    # Only run for api version tags (study-tracker-api-vX.Y.Z)
    if: startsWith(github.ref_name, 'study-tracker-api-v')
    permissions:
      contents: read
      packages: write
      id-token: write      # keyless cosign signing (OIDC)
      attestations: write  # SBOM + provenance attestations
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image name and tags
        id: image
        env:
          REGISTRY: ${{ env.REGISTRY }}
          OWNER: ${{ github.repository_owner }}
          GIT_TAG: ${{ github.ref_name }}
          TAG_PREFIX: study-tracker-api-v
          IMAGE_NAME: study-tracker-api
        run: bash scripts/ci/compute-image-tags.sh

      - name: Build and push API Docker image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: ./apps/study-tracker/api
          push: true
          platforms: linux/amd64,linux/arm64
          provenance: mode=max
          sbom: true
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api
          tags: |
            ${{ steps.image.outputs.name }}:${{ steps.image.outputs.version_tag }}
            ${{ steps.image.outputs.name }}:${{ steps.image.outputs.latest_tag }}
            ${{ steps.image.outputs.name }}:sha-${{ github.sha }}

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image (keyless)
        env:
          IMAGE: ${{ steps.image.outputs.name }}
          DIGEST: ${{ steps.build.outputs.digest }}
        # Signing by digest covers every tag pointing at it (version, latest, sha).
        run: cosign sign --yes "${IMAGE}@${DIGEST}"
    outputs:
      tag: ${{ steps.image.outputs.version_tag }}
      image: study-tracker-api

  build-and-push-web:
    name: Build and Push Web
    runs-on: ubuntu-latest
    # Only run for web version tags (study-tracker-web-vX.Y.Z)
    if: startsWith(github.ref_name, 'study-tracker-web-v')
    permissions:
      contents: read
      packages: write
      id-token: write      # keyless cosign signing (OIDC)
      attestations: write  # SBOM + provenance attestations
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image name and tags
        id: image
        env:
          REGISTRY: ${{ env.REGISTRY }}
          OWNER: ${{ github.repository_owner }}
          GIT_TAG: ${{ github.ref_name }}
          TAG_PREFIX: study-tracker-web-v
          IMAGE_NAME: study-tracker-web
        run: bash scripts/ci/compute-image-tags.sh

      - name: Build and push Web Docker image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: ./apps/study-tracker/web
          push: true
          platforms: linux/amd64,linux/arm64
          provenance: mode=max
          sbom: true
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web
          tags: |
            ${{ steps.image.outputs.name }}:${{ steps.image.outputs.version_tag }}
            ${{ steps.image.outputs.name }}:${{ steps.image.outputs.latest_tag }}
            ${{ steps.image.outputs.name }}:sha-${{ github.sha }}

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image (keyless)
        env:
          IMAGE: ${{ steps.image.outputs.name }}
          DIGEST: ${{ steps.build.outputs.digest }}
        # Signing by digest covers every tag pointing at it (version, latest, sha).
        run: cosign sign --yes "${IMAGE}@${DIGEST}"
    outputs:
      tag: ${{ steps.image.outputs.version_tag }}
      image: study-tracker-web

  trigger_gitops_dev:
    name: Update gitops (dev)
    needs: [build-and-push-api, build-and-push-web]
    # always() overrides the default 'skip-when-any-need-is-skipped' behavior
    # of `needs:` — one of the two build jobs is always skipped on a tag push
    # (the prefix selects which). The OR condition then ensures we only run
    # when at least one build succeeded.
    if: |
      always() &&
      (needs.build-and-push-api.result == 'success' ||
       needs.build-and-push-web.result == 'success')
    uses: ./.github/workflows/update-gitops.yaml
    with:
      # Skipped jobs return empty-string outputs; the `||` resolves to
      # whichever job actually ran.
      image: ${{ needs.build-and-push-api.outputs.image || needs.build-and-push-web.outputs.image }}
      tag: ${{ needs.build-and-push-api.outputs.tag || needs.build-and-push-web.outputs.tag }}
      environment: dev
      auto_merge: true
    secrets:
      gitops_app_id: ${{ secrets.GITOPS_APP_ID }}
      gitops_app_key: ${{ secrets.GITOPS_APP_KEY }}
