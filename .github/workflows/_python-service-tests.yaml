name: Reusable - Python Service Tests

# Reusable quality gate for a single Python service (api or web).
#
# Path filtering happens in the CALLER (api-tests.yaml / web-tests.yaml); this
# workflow assumes the caller already decided the service is in scope. It runs
# the full gate serially: lint -> format -> types -> security -> tests ->
# coverage report/comment -> image build -> Trivy scan.

on:
  workflow_call:
    inputs:
      service:
        description: "Service identifier (api|web). Used for tags, artifact + comment headers."
        required: true
        type: string
      working-directory:
        description: "Path to the service root (contains pyproject.toml + Dockerfile). No trailing slash."
        required: true
        type: string
      python-version:
        description: "Python version for the test job."
        required: false
        type: string
        default: "3.14"

permissions:
  contents: read

jobs:
  test:
    name: Test ${{ inputs.service }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: write  # for the coverage sticky comment
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install uv (with cache)
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: "${{ inputs.working-directory }}/uv.lock"

      - name: Set up Python ${{ inputs.python-version }}
        run: uv python install ${{ inputs.python-version }}

      - name: Install dependencies
        run: uv sync --locked --dev

      - name: Ruff lint
        run: uv run ruff check --output-format=github src tests

      - name: Ruff format check
        run: uv run ruff format --diff --check src tests

      - name: Type check (mypy)
        run: uv run mypy src

      - name: Security lint (bandit)
        run: uv run bandit -q -r src --skip B101

      - name: Dependency CVE audit (pip-audit)
        # Audits the locked production deps (what ships in the --no-dev image).
        # Runs in the service dir (defaults.run.working-directory); the script
        # lives at the repo root, so reference it via $GITHUB_WORKSPACE.
        run: bash "$GITHUB_WORKSPACE/scripts/ci/pip-audit.sh"

      - name: Tests with coverage
        # Coverage source + --cov-fail-under=80 come from pyproject.toml addopts.
        run: uv run pytest tests/ -v

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: ${{ inputs.service }}-coverage-report
          path: ${{ inputs.working-directory }}/coverage.xml
          retention-days: 7

      - name: Coverage summary
        uses: irongut/CodeCoverageSummary@v1.3.0
        with:
          filename: ${{ inputs.working-directory }}/coverage.xml
          badge: true
          format: markdown
          output: both

      - name: Coverage PR comment
        uses: marocchino/sticky-pull-request-comment@v3
        if: github.event_name == 'pull_request'
        with:
          header: ${{ inputs.service }}-test-coverage
          recreate: true
          path: code-coverage-results.md

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image for scanning
        uses: docker/build-push-action@v7
        with:
          context: ${{ inputs.working-directory }}
          push: false
          load: true
          tags: ${{ inputs.service }}-app:scan
          cache-from: type=gha,scope=${{ inputs.service }}
          cache-to: type=gha,mode=max,scope=${{ inputs.service }}

      - name: Trivy vulnerability scan (gate)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: "${{ inputs.service }}-app:scan"
          format: "table"
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: "os,library"
          severity: "CRITICAL,HIGH"
