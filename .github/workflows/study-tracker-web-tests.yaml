name: Study Tracker Web Tests

on:
  pull_request:

jobs:
  check_paths:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.filter.outputs.web }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v4.0.1
        id: filter
        with:
          filters: |
            web:
              - './apps/study-tracker/web/**'
              - '.github/workflows/study-tracker-web-tests.yaml'
  test:
    name: Test API
    needs: check_paths
    if: ${{ needs.check_paths.outputs.should_run == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./apps/study-tracker/web/
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Install UV
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
      - name: Set up Python
        run: uv python install
      - name: Install dependencies
        run: |
          uv sync --locked --dev
      - name: Lint with Ruff
        run: |
          uv run ruff check --output-format=github --target-version=py314 src tests
          uv run ruff format --diff --check --target-version=py314 src tests
      - name: Run tests with coverage
        run: |
          uv run pytest tests/ -v --cov=src/web/ --cov-report=xml --cov-fail-under=80
      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: ./apps/study-tracker/web/coverage.xml
          retention-days: 7
        if: ${{ always() }}
      - name: Coverage Report
        uses: irongut/CodeCoverageSummary@v1.3.0
        with:
          filename: ./apps/study-tracker/web/coverage.xml
          badge: true
          format: markdown
          output: both
      - name: Add Coverage PR Comment
        uses: marocchino/sticky-pull-request-comment@v3
        if: github.event_name == 'pull_request'
        with:
          header: test-coverage
          recreate: true
          path: code-coverage-results.md
      - name: Build Docker image
        run: docker build -t study-tracker-web:latest .
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: "study-tracker-web:latest"
          format: "table"
          exit-code: "0"
          # exit-code: '1' # Fail the workflow if vulnerabilities are found.
          ignore-unfixed: true
          vuln-type: "os,library"
          severity: "CRITICAL,HIGH"
