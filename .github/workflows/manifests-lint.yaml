name: Manifests Lint

# Validates the Kubernetes dev overlay on PRs that touch it: build with
# kustomize, schema-validate with kubeconform, and scan for misconfigurations
# with checkov. Tooling (kustomize/kubectl/kubeconform) is provisioned via mise
# to stay consistent with the rest of the repo.

on:
  pull_request:
    paths:
      - "kubernetes/manifests/**"
      - ".github/workflows/manifests-lint.yaml"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate Kubernetes manifests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install pinned tools (kustomize, kubectl, kubeconform) via mise
        uses: jdx/mise-action@v2

      - name: Build dev overlay
        run: kustomize build kubernetes/manifests/dev > /tmp/dev.yaml

      - name: Validate against Kubernetes 1.36 schema (kubeconform)
        run: |
          kubeconform \
            -strict \
            -summary \
            -ignore-missing-schemas \
            -kubernetes-version 1.36.1 \
            /tmp/dev.yaml

      - name: Misconfiguration scan (checkov)
        uses: bridgecrewio/checkov-action@v12
        with:
          file: /tmp/dev.yaml
          framework: kubernetes
          quiet: true
          soft_fail: false
          # Tolerate default-namespace (CKV_K8S_21) and image-tag (CKV_K8S_43) in dev.
          skip_check: CKV_K8S_21,CKV_K8S_43
