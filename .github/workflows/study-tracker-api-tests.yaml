name: Study Tracker API Tests

on:
  pull_request:

jobs:
  check_paths:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.filter.outputs.api }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v4.0.1
        id: filter
        with:
          filters: |
            backend:
              - './apps/study-tracker/api/**'
              - '.github/workflows/study-tracker-api-tests.yaml'
  test:
    name: Test API
    needs: check_paths
    if: ${{ needs.check_paths.outputs.should_run == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./apps/study-tracker/api/
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Install UV
        uses: astral-sh/setup-uv@v8
      - name: Set up Python
        run: uv python install
      - name: Install dependencies
        run: |
          uv sync --locked --dev
      - name: Lint with Ruff
        run: |
          uv run ruff check --output-format=github --target-version=py314 src tests
          uv run ruff format --diff --check --target-version=py314 src tests
      - name: Run tests with coverage
        run: |
          uv run pytest
