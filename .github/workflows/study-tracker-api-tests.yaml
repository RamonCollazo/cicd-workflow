name: Study Tracker API Tests

on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check_paths:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.filter.outputs.api }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4.0.1
        id: filter
        with:
          filters: |
            api:
              - './apps/study-tracker/api/**'
              - '.github/workflows/study-tracker-api-tests.yaml'
              - '.github/workflows/_test-python-app.yaml'

  test:
    name: Test API
    needs: check_paths
    if: needs.check_paths.outputs.should_run == 'true'
    uses: ./.github/workflows/_test-python-app.yaml
    with:
      app_name: api
      working_directory: ./apps/study-tracker/api/
      coverage_module: src/api/
      image_name: study-tracker-api
    permissions:
      contents: read
      pull-requests: write

  tests-required:
    name: tests-required
    needs: [check_paths, test]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Aggregate result
        run: |
          if [[ "${{ needs.check_paths.outputs.should_run }}" != "true" ]]; then
            echo "Paths unchanged for api; passing through."
            exit 0
          fi
          if [[ "${{ needs.test.result }}" == "success" ]]; then
            echo "API tests passed."
            exit 0
          fi
          echo "API tests failed or were cancelled: ${{ needs.test.result }}"
          exit 1
