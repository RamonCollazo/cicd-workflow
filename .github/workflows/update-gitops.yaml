name: Update GitOps

# Reusable workflow that patches a kustomization in cicd-workflow-gitops with a
# new image tag and opens (and optionally auto-merges) a PR.
#
# Authentication:
#   Uses a GitHub App installation token. The App must be installed on
#   RamonCollazo/cicd-workflow-gitops with these repository permissions:
#     - Contents:      read & write   — to push the branch
#     - Pull requests: read & write   — to create + auto-merge the PR
#
# Required secrets (one of):
#   - workflow_call:     secrets.gitops_app_id + secrets.gitops_app_key
#                        (passed by caller)
#   - workflow_dispatch: secrets.GITOPS_APP_ID + secrets.GITOPS_APP_KEY
#                        (set in repo settings)

on:
  workflow_call:
    inputs:
      image:
        required: true
        type: string
        description: "Image name (e.g. study-tracker-api)."
      tag:
        required: true
        type: string
        description: "Image tag (e.g. v1.2.3)."
      environment:
        required: true
        type: string
        description: "Target environment (dev or prod)."
      auto_merge:
        required: false
        type: boolean
        default: false
        description: "Auto-merge the resulting PR when checks pass."
    secrets:
      gitops_app_id:
        required: true
        description: "GitHub App ID for the gitops bot."
      gitops_app_key:
        required: true
        description: "GitHub App private key (PEM) for the gitops bot."

  workflow_dispatch:
    inputs:
      image:
        required: true
        type: choice
        options:
          - study-tracker-api
          - study-tracker-web
      tag:
        required: true
        type: string
        default: v0.0.0-rc1-test
      environment:
        required: true
        type: choice
        options:
          - dev
          - prod
        default: dev
      auto_merge:
        required: false
        type: boolean
        default: false

permissions:
  contents: read

# Serialize updates per (image, environment). Two near-simultaneous tags must
# not race on the same kustomization.yaml.
concurrency:
  group: gitops-${{ inputs.image }}-${{ inputs.environment }}
  cancel-in-progress: false

jobs:
  update:
    name: Patch ${{ inputs.image }} -> ${{ inputs.tag }} (${{ inputs.environment }})
    runs-on: ubuntu-latest
    env:
      GITOPS_REPO: ${{ github.repository_owner }}/cicd-workflow-gitops
      BRANCH: gitops/${{ inputs.image }}/${{ inputs.tag }}

    steps:
      - name: Mint installation token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          # Resolve from caller-supplied secret first, fall back to repo
          # secret for workflow_dispatch runs.
          app-id: ${{ secrets.gitops_app_id || secrets.GITOPS_APP_ID }}
          private-key: ${{ secrets.gitops_app_key || secrets.GITOPS_APP_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: cicd-workflow-gitops

      - name: Checkout gitops repo
        uses: actions/checkout@v6
        with:
          repository: ${{ github.repository_owner }}/cicd-workflow-gitops
          token: ${{ steps.app-token.outputs.token }}
          path: gitops
          # Don't persist the token in .git/config — peter-evans/create-pull-request
          # passes its own auth header for the push, and persisted creds cause a
          # 'Duplicate header: Authorization' (HTTP 400) on the git push.
          persist-credentials: false

      - name: Checkout actions repo (for CI scripts)
        uses: actions/checkout@v6
        with:
          path: actions-repo
          persist-credentials: false

      - name: Patch kustomization
        env:
          OWNER: ${{ github.repository_owner }}
          IMAGE: ${{ inputs.image }}
          TAG: ${{ inputs.tag }}
          ENVIRONMENT: ${{ inputs.environment }}
        # The gitops repo is checked out under gitops/; the script cd's into the
        # target overlay and runs `kustomize edit set image`.
        run: bash actions-repo/scripts/ci/patch-kustomization.sh "gitops/apps/${ENVIRONMENT}"

      - name: Create or update PR
        id: cpr
        uses: peter-evans/create-pull-request@v8
        with:
          path: gitops
          token: ${{ steps.app-token.outputs.token }}
          branch: ${{ env.BRANCH }}
          delete-branch: true
          commit-message: "chore: bump ${{ inputs.image }} to ${{ inputs.tag }} in ${{ inputs.environment }}"
          title: "Bump ${{ inputs.image }} to ${{ inputs.tag }} in ${{ inputs.environment }}"
          body: |
            Automated promotion of `${{ inputs.image }}:${{ inputs.tag }}` into `${{ inputs.environment }}`.

            Source: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          labels: |
            gitops
            ${{ inputs.environment }}

      - name: Enable auto-merge
        if: ${{ inputs.auto_merge && steps.cpr.outputs.pull-request-number != '' }}
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_NUMBER: ${{ steps.cpr.outputs.pull-request-number }}
        run: |
          gh pr merge --auto --squash --repo "$GITOPS_REPO" "$PR_NUMBER"
