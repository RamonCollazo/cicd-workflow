repos:
  - repo: https://github.com/commitizen-tools/commitizen
    rev: v4.16.3
    hooks:
      - id: commitizen
        stages: [commit-msg]
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.16
    hooks:
      - id: ruff
      - id: ruff-format
  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.7
    hooks:
      - id: actionlint
        # actionlint's bundled action metadata is stale for
        # actions/create-github-app-token@v3: it doesn't know the `client-id`
        # input (added in v3) and still thinks `app-id` is required. Both are
        # false positives — verified against the action's v3 action.yml.
        # Scope the ignore narrowly to this one action.
        args:
          - -ignore
          - 'input "client-id" is not defined in action "actions/create-github-app-token'
          - -ignore
          - 'missing input "app-id" which is required by action "actions/create-github-app-token'
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
      - id: shellcheck
